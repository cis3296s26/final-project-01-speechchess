<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="/static/style.css">
    <!--Embed the script tag for app.js. Use defer so js code will wait for the html code to finish loading-->
    <script type="text/javascript" src="/static/app.js" defer></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body class="get_started_body">
    <div class="get_started_page">
        <div class="get_started_signup_or_login">
            <h1>Create Your <a class="get_started_homepage_redirect" href="/">SpeechChess</a> Account</h1>
            {% if error %}
                <p class="authentication-error">{{ error }}</p>
            {% endif %}
            <form action="/signup" method="post">
                <input type="text" id="email" name="email" placeholder="Email" required>
                <input type="password" id="password" name="password" placeholder="Password" required>  
                <button class="button get-started-create-account-btn" type="submit">Create Account</button>          
            </form>
            <!--Need to insert a button like "Create Account" to add and commit what the user entered to the database.-->
            <p><a href="/user_authentication/login">Already Have an Account?</a></p>      
        </div>
    </div>
</body>
</html>
