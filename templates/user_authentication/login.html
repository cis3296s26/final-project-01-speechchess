<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="/static/style.css">
    <!--Embed the script tag for app.js. Use defer so js code will wait for the html code to finish loading-->
    <script type="text/javascript" src="/static/app.js" defer></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body class="login_body">
    <div class="login_page">
            <h1>Login To Your <a class="login_homepage_redirect" href="/">SpeechChess</a> Account</h1>
            <!--Indicates to user there is an error with one of the fields. Fill out the field.-->
            {% if error %}
                <p class="authentication-error">{{ error }}</p>
            {% endif %}
            <form action="/login" method="post">
                <input type="text" id="email" name="email" placeholder="Email" required>
                <input type="password" id="password" name="password" placeholder="Password" required>  
                <button class="button login-page-btn" type="submit">Sign-In</button>          
            </form>
            <!--Need to insert a button like "Create Account" to add and commit what the user entered to the database.-->
            <p><a href="/user_authentication/get_started">Don't Have An Account Yet?</a></p>      
    </div>
</body>
</html>
