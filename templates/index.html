<!DOCTYPE html>
<html>
<head>
    <title>Speech Chess</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
        .btn {
            display: block;
            margin: 15px auto;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Speech Chess</h1>

<button class="btn" onclick="startGame()">Start Game</button>
<button class="btn" onclick="voiceMode()">Voice Mode</button>

<script>
function startGame() {
    window.location.href = "/game";
}

function voiceMode() {
    window.location.href = "/voice";
}
</script>

</body>
</html>
